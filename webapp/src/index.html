<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posiano</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Posiano</h1>
        <div id="ble-status">Disconnected</div>
    </header>

    <button id="connect-btn">Connect BLE</button>

    <div id="onset-flash"></div>

    <section id="keyboard-section">
        <div id="piano-keyboard">
            <!-- White keys: C3–C6 (MIDI 48–84), 22 keys -->
            <div class="key-white" data-midi="48"></div>
            <div class="key-white" data-midi="50"></div>
            <div class="key-white" data-midi="52"></div>
            <div class="key-white" data-midi="53"></div>
            <div class="key-white" data-midi="55"></div>
            <div class="key-white" data-midi="57"></div>
            <div class="key-white" data-midi="59"></div>
            <div class="key-white" data-midi="60"></div>
            <div class="key-white" data-midi="62"></div>
            <div class="key-white" data-midi="64"></div>
            <div class="key-white" data-midi="65"></div>
            <div class="key-white" data-midi="67"></div>
            <div class="key-white" data-midi="69"></div>
            <div class="key-white" data-midi="71"></div>
            <div class="key-white" data-midi="72"></div>
            <div class="key-white" data-midi="74"></div>
            <div class="key-white" data-midi="76"></div>
            <div class="key-white" data-midi="77"></div>
            <div class="key-white" data-midi="79"></div>
            <div class="key-white" data-midi="81"></div>
            <div class="key-white" data-midi="83"></div>
            <div class="key-white" data-midi="84"></div>
            <!-- Black keys: C#3–A#5 (MIDI 49–82), 15 keys -->
            <div class="key-black" data-midi="49"></div>
            <div class="key-black" data-midi="51"></div>
            <div class="key-black" data-midi="54"></div>
            <div class="key-black" data-midi="56"></div>
            <div class="key-black" data-midi="58"></div>
            <div class="key-black" data-midi="61"></div>
            <div class="key-black" data-midi="63"></div>
            <div class="key-black" data-midi="66"></div>
            <div class="key-black" data-midi="68"></div>
            <div class="key-black" data-midi="70"></div>
            <div class="key-black" data-midi="73"></div>
            <div class="key-black" data-midi="75"></div>
            <div class="key-black" data-midi="78"></div>
            <div class="key-black" data-midi="80"></div>
            <div class="key-black" data-midi="82"></div>
        </div>
    </section>

    <main>
        <!-- MIDI Upload -->
        <section id="midi-upload">
            <h2>Load MIDI Reference</h2>
            <input type="file" id="midi-file" accept=".mid,.midi">
            <div id="midi-info"></div>
        </section>

        <!-- Real-time Feedback -->
        <section id="feedback">
            <div id="note-display">--</div>
            <div id="timing-bar"></div>
            <div id="posture-alert"></div>
        </section>

        <!-- Session Summary -->
        <section id="session">
            <h2>Session</h2>
            <div id="session-stats"></div>
        </section>
    </main>

    <script src="js/ble.js"></script>
    <script src="js/midi-parser.js"></script>
    <script src="js/feedback.js"></script>
    <script src="js/session.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
